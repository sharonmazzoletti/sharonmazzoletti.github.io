<section class="video-page">
  <div class="video-page__inner">
    <h1 class="video-page__heading" id="videoHeading"></h1>
    <div class="video-page__desc" id="videoDesc"></div>
    <div class="video-grid" id="videoGrid"></div>
  </div>
</section>

<script src="js/nav.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/data/video.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      document.getElementById('videoHeading').textContent = data.heading;
      document.getElementById('videoDesc').innerHTML = data.description;

      const grid = document.getElementById('videoGrid');
      (data.videos || []).forEach(v => {
        const item = document.createElement('div');
        item.className = 'video-item';

        const title = document.createElement('h2');
        title.className = 'video-item__title';
        title.textContent = v.title;

        const wrap = document.createElement('div');
        wrap.className = 'video-item__embed-wrap';

        if (v.embedUrl) {
          const iframe = document.createElement('iframe');
          iframe.className = 'video-item__embed';
          iframe.src = v.embedUrl;
          iframe.title = v.title;
          iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
          iframe.allowFullscreen = true;
          wrap.appendChild(iframe);
        } else {
          const ph = document.createElement('div');
          ph.className = 'video-item__placeholder';
          ph.textContent = 'Video folgt';
          wrap.appendChild(ph);
        }

        item.append(title, wrap);
        grid.appendChild(item);
      });
    } catch (err) {
      console.error('Fehler beim Laden der Videos:', err);
    }
  });
</script>
