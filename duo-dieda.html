<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/data/duo-dieda.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      // Intro
      const bodyEl = document.getElementById('ensIntroBody');
      if (bodyEl) bodyEl.innerHTML = data.intro.text;
      const btnEl = document.getElementById('ensIntroBtn');
      if (btnEl) { btnEl.textContent = data.intro.button.text; btnEl.href = data.intro.button.href; }

      // Gallery
      if (data.gallery && data.gallery.length > 0) initEnsembleGallery(data.gallery);

      // Video
      const headingEl = document.getElementById('ensVideoHeading');
      if (headingEl) headingEl.textContent = data.video.heading;
      const descEl = document.getElementById('ensVideoDesc');
      if (descEl) descEl.innerHTML = data.video.description;
      const embedEl = document.getElementById('ensVideoEmbed');
      const wrapEl = document.getElementById('ensVideoWrap');
      if (embedEl && data.video.embedUrl) {
        embedEl.src = data.video.embedUrl;
        if (wrapEl) wrapEl.style.display = '';
      }

      // Repertoire — flat list, no categories
      const listEl = document.getElementById('ensRepertoireList');
      if (listEl && data.repertoire && data.repertoire.items) {
        const frag = document.createDocumentFragment();
        data.repertoire.items.forEach(item => {
          const li = document.createElement('li');
          li.className = 'repertoire__item';
          li.textContent = item;
          frag.appendChild(li);
        });
        listEl.appendChild(frag);
      }
    } catch (err) {
      console.error('Fehler beim Laden der Inhalte:', err);
    }
  });
</script>
