<main>

        <div class="kik__text" id="kikText"></div>
      </div>

      <div class="kik__logo-col">
        <a class="kik__logo" id="kikLogoLink" href="https://kikonzerte.ch" target="_blank" rel="noopener noreferrer">

<script src="js/nav.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/data/kik.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      document.getElementById('kikText').innerHTML = data.text || '';
      const img = document.getElementById('kikLogoImg');
      if (data.logoSrc) img.src = data.logoSrc;
      const link = document.getElementById('kikLogoLink');
      if (data.logoHref) link.href = data.logoHref;
    } catch (err) {
      console.error('Fehler beim Laden der KiK-Daten:', err);
    }
  });
</script>
