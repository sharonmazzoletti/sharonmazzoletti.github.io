<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/data/trio-note-a-note.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      // Intro
      const bodyEl = document.getElementById('ensIntroBody');
      if (bodyEl) bodyEl.innerHTML = data.intro.text;
      const btnEl = document.getElementById('ensIntroBtn');
      if (btnEl) {
        btnEl.textContent = data.intro.button.text;
        btnEl.href = data.intro.button.href;
      }

      // Gallery
      if (data.gallery && data.gallery.length > 0) {
        initEnsembleGallery(data.gallery);
      }

      // Video
      const headingEl = document.getElementById('ensVideoHeading');
      if (headingEl) headingEl.textContent = data.video.heading;
      const descEl = document.getElementById('ensVideoDesc');
      if (descEl) descEl.innerHTML = data.video.description;
      const embedEl = document.getElementById('ensVideoEmbed');
      if (embedEl && data.video.embedUrl) embedEl.src = data.video.embedUrl;

      // Repertoire — split sections across two explicit columns by item count
      const colWrap = document.getElementById('ensRepertoireColumns');
      if (colWrap && data.repertoire && data.repertoire.sections) {
        const sections = data.repertoire.sections;
        const totalItems = sections.reduce((sum, s) => sum + s.items.length, 0);
        const midpoint = Math.ceil(totalItems / 2);

        let col1 = [], col2 = [], count = 0;
        for (const section of sections) {
          if (count < midpoint) { col1.push(section); count += section.items.length; }
          else { col2.push(section); }
        }

        [col1, col2].forEach(colSections => {
          const ul = document.createElement('ul');
          ul.className = 'repertoire__col-list';
          colSections.forEach(section => {
            const cat = document.createElement('li');
            cat.className = 'repertoire__category';
            cat.textContent = section.heading;
            ul.appendChild(cat);
            section.items.forEach(item => {
              const li = document.createElement('li');
              li.className = 'repertoire__item';
              li.textContent = item;
              ul.appendChild(li);
            });
          });
          colWrap.appendChild(ul);
        });
      }
    } catch (err) {
      console.error('Fehler beim Laden der Inhalte:', err);
    }
  });
</script>
