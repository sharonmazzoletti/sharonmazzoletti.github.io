<!-- ===== MAIN ===== -->
<div class="archiv-page">
  <div class="archiv-page__inner">
    <h1 class="archiv-page__heading" id="archivHeading">Konzertarchiv</h1>
    <div id="archivConcerts"></div>
    <nav class="archiv__year-nav" id="archivYearNav" aria-label="Jahr wählen"></nav>
  </div>
</div>

<script src="js/nav.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/data/archiv.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const years = data.years || [];

      function getYear() {
        const h = window.location.hash.slice(1);
        return (h && years.find(y => y.year === h)) ? h : (years[0] ? years[0].year : '');
      }

      function renderYear(yearStr) {
        const yearData = years.find(y => y.year === yearStr);
        if (!yearData) return;

        document.getElementById('archivHeading').textContent = 'Konzertarchiv ' + yearStr;

        const container = document.getElementById('archivConcerts');
        container.innerHTML = '';

        yearData.concerts.forEach((concert, i) => {
          const entry = document.createElement('article');
          entry.className = 'archiv__entry' + (i % 2 !== 0 ? ' archiv__entry--alt' : '') + (!concert.imageSrc ? ' archiv__entry--no-img' : '');

          const textDiv = document.createElement('div');
          textDiv.className = 'archiv__entry-text';

          const h2 = document.createElement('h2');
          h2.className = 'archiv__entry-title';
          h2.textContent = concert.title;

          const p = document.createElement('p');
          p.className = 'archiv__entry-desc';
          p.textContent = concert.description;

          textDiv.append(h2, p);
          entry.appendChild(textDiv);

          if (concert.imageSrc) {
            const imgDiv = document.createElement('div');
            imgDiv.className = 'archiv__entry-img';
            const img = document.createElement('img');
            img.src = concert.imageSrc;
            img.alt = concert.title;
            img.loading = 'lazy';
            imgDiv.appendChild(img);
            entry.appendChild(imgDiv);
          }

          container.appendChild(entry);
        });

        document.querySelectorAll('.archiv__year-btn').forEach(btn => {
          btn.classList.toggle('is-active', btn.dataset.year === yearStr);
        });
      }

      // Build year nav buttons
      const nav = document.getElementById('archivYearNav');
      years.forEach(y => {
        const btn = document.createElement('button');
        btn.className = 'archiv__year-btn';
        btn.dataset.year = y.year;
        btn.textContent = y.year;
        btn.addEventListener('click', () => {
          history.replaceState(null, '', '#' + y.year);
          renderYear(y.year);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        nav.appendChild(btn);
      });

      renderYear(getYear());
      window.addEventListener('hashchange', () => renderYear(getYear()));

    } catch (err) {
      console.error('Fehler beim Laden des Archivs:', err);
    }
  });
</script>
