<div class="kontakt-page">
  <div class="kontakt-page__inner">
    <h1 class="kontakt-page__heading">Kontakt</h1>
    <p class="kontakt-page__text" id="kontaktText"></p>
    <a id="kontaktLink" href="#" class="kontakt-page__link">Kontakt aufnehmen</a>
  </div>
</div>

<script src="js/nav.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/data/kontakt.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      document.getElementById('kontaktText').textContent = data.text || '';
      const link = document.getElementById('kontaktLink');
      link.href = 'mailto:' + data.email;
      link.textContent = data.label;
    } catch (err) {
      console.error('Fehler:', err);
    }
  });
</script>
