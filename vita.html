<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/data/vita.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const el = document.getElementById('vitaBody');
      if (el && data.text) el.innerHTML = data.text;
    } catch {
      /* no-op */
    }
  });
